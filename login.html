<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StarKids Digital Academy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>
      
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>

        <div class="form-group">
          <label for="role">Login As</label>
          <select id="role" name="role" required>
            <option value="">Select your role</option>
            <option value="student">Student</option>
            <option value="parent">Parent</option>
            <option value="teacher">Teacher</option>
            <option value="admin">Administrator</option>
          </select>
        </div>

        <div id="errorMessage" class="error hidden"></div>

        <button type="submit" class="btn btn-orange" style="width: 100%; padding: 1rem;">Sign In</button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; color: var(--light-text);">
        Don't have an account? <a href="register.html" style="color: var(--primary-orange); font-weight: 600; text-decoration: none;">Register here</a>
      </p>

      <p style="text-align: center; margin-top: 1rem; color: var(--light-text);">
        <a href="index.html" style="color: var(--primary-orange); font-weight: 600; text-decoration: none;">← Back to Home</a>
      </p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const errorDiv = document.getElementById('errorMessage');

      if (!email || !password || !role) {
        errorDiv.textContent = 'Please fill in all fields';
        errorDiv.classList.remove('hidden');
        return;
      }

      // Mock login
      const user = login(email, password, role);
      
      if (user) {
        errorDiv.classList.add('hidden');
        
        // Redirect based on role
        const redirects = {
          'student': 'student-dashboard.html',
          'parent': 'parent-dashboard.html',
          'teacher': 'teacher-dashboard.html',
          'admin': 'admin-dashboard.html'
        };
        
        window.location.href = redirects[role] || 'index.html';
      } else {
        errorDiv.textContent = 'Login failed. Please try again.';
        errorDiv.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
